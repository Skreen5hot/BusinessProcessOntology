# Generated config for the ontology docs site (edit freely; consumed by the
# ontology-webhost-template generator fetched at CI -- see .github/workflows/static.yml).
site:
  name: Business Process Ontology
  repo_url: https://github.com/Skreen5hot/BusinessProcessOntology
  description: A BFO/CCO-compatible ontology of business processes based on the APQC Process Classification
    Framework.
metadata:
  introduction: 'The Business Process Ontology (BPO) is a BFO-2020 / CCO-2.0 formalization of the APQC
    Process Classification Framework (Cross-Industry, v7.4). Two layers (ADR-001): a lossless **catalog**
    of every PCF element, and a **reality layer** of BFO process universals -- plus a **capability/role**
    dispatch bridge that maps each process to the agents that can perform it. Every class is anchored
    to a verified BFO/CCO term and validated (Gates A-F). Each module below has its own page, term table,
    and Turtle download.'
  license:
    label: MIT
    url: ../LICENSE
  contacts:
  - name: Aaron Damiano (maintainer)
  users:
  - name: Ontology engineers
    website: https://github.com/Skreen5hot/BusinessProcessOntology
  - name: Process & data analysts
    website: https://github.com/Skreen5hot/BusinessProcessOntology
generation:
  output_dir: docs
  generated_dir: docs/ontologies
  artifact_dir: docs/artifacts
  qa_results_dir: build/qa
  fail_on_missing_ontology: true
  term_table:
    enabled: true
    include_deprecated: false
    include_imported_terms: false
    types:
    - owl:Class
    - owl:ObjectProperty
    - owl:NamedIndividual
    - owl:DatatypeProperty
    - owl:AnnotationProperty
